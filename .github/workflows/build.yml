name: Build and Package

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'

    - name: Cache Maven repository
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-jdk25-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-jdk25-

    - name: Compute version with commit hash
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          COMMIT_HASH=${{ github.event.pull_request.head.sha }}
        else
          COMMIT_HASH=${{ github.sha }}
        fi
        COMMIT_HASH=${COMMIT_HASH:0:7}
        CURRENT_VERSION=$(grep -m 1 "<revision>" pom.xml | sed 's/.*<revision>\(.*\)<\/revision>.*/\1/')
        NEW_VERSION="${CURRENT_VERSION}-${COMMIT_HASH}"
        echo "VERSION=$NEW_VERSION" >> $GITHUB_ENV
        echo "JAR_FILENAME=shop-${NEW_VERSION}.jar" >> $GITHUB_ENV

    - name: Generate Maven toolchains.xml (JDK 25)
      run: |
        mkdir -p ~/.m2
        cat > ~/.m2/toolchains.xml <<'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <toolchains>
          <toolchain>
            <type>jdk</type>
            <provides>
              <version>25</version>
              <vendor>any</vendor>
            </provides>
            <configuration>
              <jdkHome>${JAVA_HOME}</jdkHome>
            </configuration>
          </toolchain>
        </toolchains>
        EOF

    - name: Install BlockProt API
      run: |
        chmod +x ./scripts/install-blockprot-api.sh
        ./scripts/install-blockprot-api.sh

    - name: Build
      run: mvn -B -nsu -T 1C -Drevision=${{ env.VERSION }} clean package -pl core,dist -am

    - name: Publish Test Results
      if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      uses: dorny/test-reporter@v1
      continue-on-error: true
      with:
        name: JUnit Tests
        path: '**/target/surefire-reports/*.xml'
        reporter: java-junit
        fail-on-error: false
        fail-on-empty: false

    - name: Upload Artifact
      id: upload-shop-jar
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.JAR_FILENAME }}
        path: target/Shop-*.jar

    - name: Create workflow summary
      if: always()
      run: |
        STATUS="${{ job.status }}"
        JAR_URL="${{ steps.upload-shop-jar.outputs.artifact-url }}"
        {
          if [ "$STATUS" = "success" ]; then
            echo "# Build Completed Successfully"
          else
            echo "# Build Failed"
          fi
          echo ""
          echo "**Version:** $VERSION"
          echo ""
          if [ -n "$JAR_URL" ]; then
            echo "### Download Build"
            echo "- [$JAR_FILENAME]($JAR_URL)"
            echo ""
          fi
        } > build-summary.md
        cat build-summary.md >> "$GITHUB_STEP_SUMMARY"

    - name: Build Summary
      if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
      uses: marocchino/sticky-pull-request-comment@v2
      with:
        path: build-summary.md

    - name: Comment PR with Coverage Report
      if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      uses: madrapps/jacoco-report@v1.6.1
      continue-on-error: true
      with:
        paths: |
          **/target/site/jacoco/jacoco.xml
        token: ${{ secrets.GITHUB_TOKEN }}
        min-coverage-overall: 0
        min-coverage-changed-files: 30
        title: Coverage Report
        update-comment: true

    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: target/Shop-*.jar
